<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jarvis">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Jarvis Voice</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0f; color: #e0e0e0;
  display: flex; flex-direction: column; height: 100vh;
}

.header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  padding: 14px 24px; border-bottom: 1px solid #2a2a4a;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.header h1 {
  font-size: 1.4rem;
  background: linear-gradient(90deg, #00d4ff, #7b2ff7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-right { display: flex; align-items: center; gap: 16px; }
.status { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%; background: #555;
  transition: background 0.3s;
}
.status-dot.active { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
.status-dot.listening { background: #ff4444; box-shadow: 0 0 10px #ff4444; animation: pulse 1.5s infinite; }
.status-dot.processing { background: #ffaa00; box-shadow: 0 0 10px #ffaa00; animation: pulse 0.8s infinite; }
.queue-badge {
  background: #7b2ff7; color: #fff; padding: 2px 8px; border-radius: 10px;
  font-size: 0.7rem; font-weight: 700; display: none;
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.layout {
  flex: 1; display: flex; gap: 0;
  min-height: 0; /* critical for flex children to shrink and scroll */
}

.conv-panel {
  flex: 1; display: flex; flex-direction: column; padding: 14px; gap: 10px;
  min-width: 0; min-height: 0;
}

.controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
button {
  padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
}
button:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-listen {
  background: linear-gradient(135deg, #00d4ff, #0099cc); color: #000;
  font-size: 1rem; padding: 12px 28px;
}
.btn-listen:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,0.3); }
.btn-listen.recording { background: linear-gradient(135deg, #ff4757, #cc0022); color: #fff; }
.btn-sleep {
  background: #1a1a2e; color: #888; border: 1px solid #2a2a4a;
  padding: 10px 16px; font-size: 0.85rem;
}
.btn-sleep:hover:not(:disabled) { background: #222240; color: #aaa; }
.btn-sleep.sleeping { background: #1a1a2e; color: #555; border-color: #1a1a2e; }
.btn-sleep.wake-word-active { background: linear-gradient(135deg, #2a1a4e, #1a2a4e); color: #a371f7; border-color: #3a2a6a; }
.gate-control { display: flex; align-items: center; gap: 6px; }

.visualizer { height: 36px; background: #12121f; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
canvas { width: 100%; height: 100%; }

.conversation {
  flex: 1; overflow-y: auto; background: #12121f; border: 1px solid #2a2a4a;
  border-radius: 10px; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 0; /* KEY: allows flex item to shrink below content size, enabling scroll */
}

.msg {
  max-width: 88%; padding: 10px 14px; border-radius: 10px;
  font-size: 0.9rem; line-height: 1.5; word-wrap: break-word;
  flex-shrink: 0; /* messages don't shrink */
}
.msg.user { align-self: flex-end; background: #1a3a5c; border: 1px solid #2a5a8c; color: #cde; }
.msg.assistant { align-self: flex-start; background: #1a1a2e; border: 1px solid #3a3a5a; color: #e0e0e0; }
.msg.interim { align-self: flex-end; background: transparent; border: 1px dashed #333; color: #666; font-style: italic; }
.msg .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; opacity: 0.5; }

.text-input-row { display: flex; gap: 8px; flex-shrink: 0; }
.text-input-row input {
  flex: 1; padding: 10px 14px; border: 1px solid #2a2a4a; border-radius: 8px;
  background: #12121f; color: #e0e0e0; font-size: 0.9rem; outline: none;
}
.text-input-row input:focus { border-color: #00d4ff; }
.text-input-row button { padding: 10px 16px; background: #7b2ff7; color: #fff; border-radius: 8px; }

/* Activity panel */
.activity-panel {
  width: 380px; border-left: 1px solid #1a1a2e; background: #08080d;
  display: flex; flex-direction: column;
  min-height: 0;
}
.activity-header {
  padding: 10px 14px; border-bottom: 1px solid #1a1a2e;
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #555;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.activity-header button {
  padding: 3px 8px; font-size: 0.65rem; background: #1a1a2e; color: #555;
  border-radius: 4px;
}
.activity-feed {
  flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 5px;
  min-height: 0; /* KEY: same fix for activity scroll */
}

.activity-item {
  padding: 7px 9px; border-radius: 5px; font-size: 0.75rem; line-height: 1.4;
  border-left: 3px solid transparent; word-wrap: break-word;
  flex-shrink: 0;
}
.activity-item.tool {
  background: #0d1117; border-left-color: #f0883e; color: #d2a8ff;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.activity-item.result {
  background: #0d1117; border-left-color: #3fb950; color: #8b949e;
  font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.7rem;
}
.activity-item.thinking {
  background: #0d1117; border-left-color: #58a6ff; color: #8b949e;
  font-style: italic;
}
.activity-item.intel {
  background: #0d1420; border-left-color: #a371f7; color: #c9d1d9;
}
.activity-item .activity-label {
  font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 2px; opacity: 0.6;
}
.activity-item.tool .activity-label { color: #f0883e; }
.activity-item.result .activity-label { color: #3fb950; }
.activity-item.thinking .activity-label { color: #58a6ff; }
.activity-item.intel .activity-label { color: #a371f7; }
.activity-item .activity-time {
  font-size: 0.55rem; color: #484f58; float: right;
}
.activity-item .activity-latency {
  font-size: 0.55rem; float: right; margin-right: 6px; padding: 0 4px;
  border-radius: 3px; font-weight: 600;
  background: #1a1a2e; color: #ffaa00;
}

.intel-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.intel-tag {
  padding: 1px 6px; border-radius: 3px; font-size: 0.65rem; font-weight: 500;
}
.intel-tag.sentiment-positive { background: #0d2818; color: #3fb950; }
.intel-tag.sentiment-negative { background: #280d0d; color: #f85149; }
.intel-tag.sentiment-neutral { background: #161b22; color: #8b949e; }
.intel-tag.intent { background: #1a1533; color: #a371f7; }
.intel-tag.topic { background: #0d1b2a; color: #58a6ff; }

/* Profile switcher */
.profile-select {
  background: #12121f; color: #e0e0e0; border: 1px solid #2a2a4a;
  border-radius: 6px; padding: 6px 10px; font-size: 0.75rem;
  outline: none; cursor: pointer;
}
.profile-select:focus { border-color: #00d4ff; }
.profile-select option { background: #12121f; color: #e0e0e0; }

/* Push-to-talk hint */
.ptt-hint {
  font-size: 0.6rem; color: #555; text-align: center;
  flex-shrink: 0; padding: 2px 0;
}
.ptt-hint kbd {
  background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 3px;
  padding: 1px 5px; font-family: monospace; color: #888;
}

@media (max-width: 900px) {
  .layout { flex-direction: column; }
  .activity-panel { width: 100%; max-height: 220px; border-left: none; border-top: 1px solid #1a1a2e; }
}

@media (max-width: 600px) {
  /* Header adjustments */
  .header {
    padding: 12px 16px;
  }
  .header h1 {
    font-size: 1.2rem;
  }
  .header-right {
    gap: 10px;
  }
  .status {
    font-size: 0.75rem;
  }
  
  /* Main layout - hide activity panel on small screens, show toggle instead */
  .layout {
    position: relative;
  }
  
  .conv-panel {
    padding: 10px;
    gap: 8px;
  }
  
  /* Controls - full width buttons */
  .controls {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }
  
  .btn-listen {
    width: 100%;
    padding: 16px 24px;
    font-size: 1.1rem;
    min-height: 56px;
  }
  
  .gate-control {
    justify-content: center;
    padding: 8px 0;
  }
  
  /* Larger touch targets */
  button {
    min-height: 44px;
    padding: 12px 20px;
  }
  
  /* Conversation - more compact */
  .conversation {
    padding: 10px;
    gap: 8px;
  }
  
  .msg {
    max-width: 92%;
    padding: 10px 12px;
    font-size: 0.95rem;
  }
  
  /* Text input - larger for mobile typing */
  .text-input-row input {
    padding: 14px 16px;
    font-size: 16px; /* Prevents zoom on iOS */
  }
  
  .text-input-row button {
    padding: 14px 20px;
  }
  
  /* Activity panel as overlay on mobile */
  .activity-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 85%;
    max-width: 320px;
    height: 100vh;
    max-height: 100vh;
    z-index: 1000;
    transition: right 0.3s ease;
    border-top: none;
    border-left: 1px solid #1a1a2e;
  }
  
  .activity-panel.open {
    right: 0;
  }
  
  /* Activity overlay backdrop */
  .activity-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 999;
  }
  
  .activity-overlay.open {
    display: block;
  }
  
  /* Activity toggle button in header */
  .profile-select { font-size: 0.7rem; }

  .activity-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 6px;
    color: #888;
    font-size: 0.75rem;
    cursor: pointer;
  }
  
  .activity-toggle::before {
    content: '';
    width: 8px;
    height: 8px;
    background: #7b2ff7;
    border-radius: 50%;
  }
  
  /* Visualizer height */
  .visualizer {
    height: 48px;
  }
}

@media (max-width: 600px) {
  .activity-toggle {
    display: flex;
  }
}

@media (min-width: 601px) {
  .activity-toggle,
  .activity-overlay {
    display: none !important;
  }
}
</style>
</head>
<body>

  <div class="header">
    <h1>JARVIS</h1>
    <div class="header-right">
      <select class="profile-select" id="profileSelect" onchange="switchProfile(this.value)" title="LLM Profile">
        <option value="">Loading...</option>
      </select>
      <button class="activity-toggle" onclick="toggleActivityPanel()">Activity</button>
      <span class="queue-badge" id="queueBadge"></span>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Ready</span>
      </div>
    </div>
  </div>
  
  <div class="activity-overlay" id="activityOverlay" onclick="toggleActivityPanel()"></div>

<div class="layout">
  <div class="conv-panel">
    <div class="controls">
      <button class="btn-listen" id="btnListen" onclick="toggleVoice()">Start Listening</button>
      <button class="btn-sleep" id="btnSleep" onclick="toggleSleep()">Sleep</button>
      <div class="gate-control">
        <label for="gateSlider" style="font-size:0.7rem;color:#666;">Noise Gate</label>
        <input type="range" id="gateSlider" min="0" max="100" value="30"
          style="width:100px;accent-color:#00d4ff;vertical-align:middle;"
          oninput="noiseGateThreshold=this.value/1000; document.getElementById('gateVal').textContent=(this.value/10).toFixed(1)+'%'">
        <span id="gateVal" style="font-size:0.65rem;color:#555;min-width:30px;">3.0%</span>
      </div>
    </div>
    <div class="visualizer"><canvas id="visualizer"></canvas></div>
    <div class="ptt-hint">Hold <kbd>Space</kbd> to push-to-talk (releases immediately)</div>
    <div class="conversation" id="conversation"></div>
    <div class="text-input-row">
      <input type="text" id="textInput" placeholder="Or type a message..." onkeydown="if(event.key==='Enter')sendText()">
      <button onclick="sendText()">Send</button>
    </div>
  </div>

  <div class="activity-panel">
    <div class="activity-header">
      <span>Agent Activity</span>
      <button onclick="clearActivity()">Clear</button>
    </div>
    <div class="activity-feed" id="activityFeed"></div>
  </div>
</div>

<script>
let ws = null;
let mediaStream = null;
let audioContext = null;
let processor = null;
let analyser = null;
let animFrame = null;
let isListening = false;
let isDeepgramActive = false; // Whether Deepgram STT is connected (costs money)
let speechFrames = 0; // Consecutive frames with voice activity
let VAD_TRIGGER_FRAMES = 5; // Frames of speech needed to activate Deepgram (higher = less false triggers)
let ttsQueue = [];
let isPlayingTTS = false;
let currentTTSSource = null;
let ttsCtx = null; // persistent AudioContext for TTS playback
let noiseGateThreshold = 0.03; // Higher default = less background noise pickup
let silenceFrames = 0;
let pttActive = false; // push-to-talk state
let useOpus = false; // Opus codec detection
let isSleeping = false; // Sleep mode — all listening stopped
let appName = 'Mawa'; // Configurable app name
let keepAliveCtx = null; // Silent audio context to prevent iOS suspension
let keepAliveSource = null;

const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;

// Persistent client ID — survives page refreshes, reconnects, and PWA restarts
function getClientId() {
  let id = localStorage.getItem('jarvis_client_id');
  if (!id) {
    id = 'voice_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    localStorage.setItem('jarvis_client_id', id);
  }
  return id;
}
const CLIENT_ID = getClientId();

function setStatus(text, state) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'status-dot' + (state ? ' ' + state : '');
}

function scrollToBottom(el) {
  // Use setTimeout to ensure DOM has updated and layout is computed
  setTimeout(() => { el.scrollTop = el.scrollHeight; }, 0);
}

function addMessage(role, text, cls) {
  const conv = document.getElementById('conversation');
  conv.querySelectorAll('.interim').forEach(el => el.remove());

  if (role === 'assistant') {
    const pending = conv.querySelector('.msg.assistant.pending');
    if (pending) {
      pending.classList.remove('pending');
      pending.querySelector('.msg-body').textContent = text;
      scrollToBottom(conv);
      return pending;
    }
  }

  const div = document.createElement('div');
  div.className = 'msg ' + (cls || role);
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'You' : 'Jarvis';
  div.appendChild(label);
  const body = document.createElement('div');
  body.className = 'msg-body';
  body.textContent = text;
  div.appendChild(body);
  conv.appendChild(div);
  scrollToBottom(conv);
  return div;
}

function updateInterim(text) {
  const conv = document.getElementById('conversation');
  let interim = conv.querySelector('.interim');
  if (!interim) {
    interim = document.createElement('div');
    interim.className = 'msg interim';
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = 'You';
    interim.appendChild(label);
    const body = document.createElement('div');
    body.className = 'interim-body';
    interim.appendChild(body);
    conv.appendChild(interim);
  }
  interim.querySelector('.interim-body').textContent = text;
  scrollToBottom(conv);
}

function addActivity(kind, text, data, latencyMs) {
  const feed = document.getElementById('activityFeed');
  const item = document.createElement('div');
  item.className = 'activity-item ' + kind;

  const now = new Date();
  const ts = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const latencyStr = latencyMs != null ? formatLatency(latencyMs) : '';
  const latencyHtml = latencyStr ? `<span class="activity-latency">${latencyStr}</span>` : '';

  const labels = {tool: 'Tool Call', result: 'Tool Result', thinking: 'Thinking', intel: 'Speech Intelligence'};

  if (kind === 'intel' && data) {
    let html = `<span class="activity-time">${ts}</span>${latencyHtml}<div class="activity-label">${labels[kind]}</div>`;
    html += '<div class="intel-tags">';
    if (data.sentiment) {
      const cls = data.sentiment === 'positive' ? 'sentiment-positive' :
                  data.sentiment === 'negative' ? 'sentiment-negative' : 'sentiment-neutral';
      html += `<span class="intel-tag ${cls}">${data.sentiment} ${data.sentiment_score || ''}</span>`;
    }
    if (data.intents) data.intents.forEach(i => { html += `<span class="intel-tag intent">${esc(i)}</span>`; });
    if (data.topics) data.topics.forEach(t => { html += `<span class="intel-tag topic">${esc(t)}</span>`; });
    html += '</div>';
    if (data.summary) html += `<div style="margin-top:4px;font-size:0.7rem;color:#8b949e;">${esc(data.summary)}</div>`;
    item.innerHTML = html;
  } else {
    item.innerHTML = `<span class="activity-time">${ts}</span>${latencyHtml}<div class="activity-label">${labels[kind] || kind}</div>${esc(text)}`;
  }

  feed.appendChild(item);
  scrollToBottom(feed);

  while (feed.children.length > 300) feed.removeChild(feed.firstChild);
}

function clearActivity() {
  document.getElementById('activityFeed').innerHTML = '';
}

function toggleActivityPanel() {
  const panel = document.querySelector('.activity-panel');
  const overlay = document.getElementById('activityOverlay');
  panel.classList.toggle('open');
  overlay.classList.toggle('open');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatLatency(ms) {
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(1) + 's';
}

function updateQueueBadge(count) {
  const badge = document.getElementById('queueBadge');
  if (count > 0) {
    badge.textContent = count + ' queued';
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }
}

// ── Barge-in: stop TTS when user starts speaking ──
function stopAllTTS() {
  ttsQueue = [];
  isPlayingTTS = false;
  if (currentTTSSource) {
    try { currentTTSSource.stop(); } catch(e) {}
    currentTTSSource = null;
  }
  // Don't close ttsCtx — it's persistent and reused
}

function getTTSContext(sampleRate) {
  if (ttsCtx && ttsCtx.sampleRate === sampleRate && ttsCtx.state !== 'closed') return ttsCtx;
  if (ttsCtx) { try { ttsCtx.close(); } catch(e) {} }
  ttsCtx = new AudioContext({ sampleRate });
  return ttsCtx;
}

function connectWS() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    // Send persistent client ID so server reuses session across reconnects
    ws.send(JSON.stringify({ action: 'identify', client_id: CLIENT_ID }));
    setStatus('Connected', 'active');
  };
  ws.onmessage = (event) => handleMessage(JSON.parse(event.data));
  ws.onerror = () => setStatus('Error', '');
  ws.onclose = () => { setStatus('Disconnected', ''); setTimeout(connectWS, 2000); };
}

async function toggleVoice() {
  if (isListening) stopListening();
  else await startListening();
}

async function startListening() {
  // Guard: clean up any existing listening state first
  if (isListening) {
    stopListening();
    await new Promise(r => setTimeout(r, 200));
  }
  // Clean up any leftover audio from wake word mode
  cleanupAudio();

  try {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      connectWS();
      await new Promise(r => setTimeout(r, 1000));
    }
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      setStatus('Cannot connect', '');
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('Mic requires HTTPS. Access via https://<tailscale-hostname>:' + location.port);
      return;
    }
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    audioContext = new AudioContext({ sampleRate: 16000 });
    // iOS: resume suspended AudioContext
    if (audioContext.state === 'suspended') {
      await audioContext.resume();
    }
    const source = audioContext.createMediaStreamSource(mediaStream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    drawVisualizer();
    processor = audioContext.createScriptProcessor(2048, 1, 1);
    source.connect(processor);
    processor.connect(audioContext.destination);
    processor.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const f = e.inputBuffer.getChannelData(0);
      let sum = 0;
      for (let i = 0; i < f.length; i++) sum += f[i] * f[i];
      const rms = Math.sqrt(sum / f.length);
      const i16 = new Int16Array(f.length);

      if (rms >= noiseGateThreshold) {
        silenceFrames = 0;
        for (let i = 0; i < f.length; i++) i16[i] = Math.max(-32768, Math.min(32767, Math.round(f[i] * 32767)));

        // Auto-wake: voice detected, connect Deepgram if not active
        if (!isDeepgramActive) {
          speechFrames++;
          if (speechFrames >= VAD_TRIGGER_FRAMES) {
            activateDeepgram();
          }
          return; // Buffer these frames until Deepgram is ready
        }
        ws.send(i16.buffer);
      } else {
        silenceFrames++;
        speechFrames = 0;
        // Send silent frames to keep Deepgram alive while active
        if (isDeepgramActive) {
          ws.send(i16.buffer);
        }
      }
    };
    // Start in idle mode — mic open, Deepgram OFF until speech detected by VAD
    startKeepAlive();
    isListening = true;
    isDeepgramActive = false;
    speechFrames = 0;
    const btn = document.getElementById('btnListen');
    btn.textContent = 'Stop';
    btn.classList.add('recording');
    setStatus('Mic open — speak to activate', 'active');
  } catch (err) {
    console.error('startListening error:', err);
    cleanupAudio();
    setStatus('Mic error: ' + err.message, '');
  }
}

function stopListening() {
  if (isDeepgramActive && ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'stop' }));
  }
  isDeepgramActive = false;
  speechFrames = 0;
  cleanupAudio();
  stopKeepAlive();
  isListening = false;
  const btn = document.getElementById('btnListen');
  btn.textContent = 'Start Listening';
  btn.classList.remove('recording');
  setStatus('Connected', 'active');
}

function cleanupAudio() {
  if (processor) { processor.disconnect(); processor = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

function handleMessage(data) {
  switch (data.type) {
    case 'started':
      setStatus('Listening', 'listening');
      break;
    case 'stopped':
      if (isListening) {
        setStatus('Mic open — speak to activate', 'active');
      } else {
        setStatus('Connected', 'active');
      }
      break;
    case 'transcript':
      if (!data.is_final) updateInterim(data.text);
      break;
    case 'speech_started':
      // Barge-in: user started talking, stop any TTS playback immediately
      stopAllTTS();
      setStatus('Hearing you...', 'listening');
      break;
    case 'utterance_end':
      document.querySelectorAll('.interim').forEach(el => el.remove());
      break;
    case 'processing':
      addMessage('user', data.text);
      const pending = addMessage('assistant', 'Thinking...', 'assistant pending');
      pending.querySelector('.msg-body').style.opacity = '0.4';
      setStatus('Thinking...', 'processing');
      break;
    case 'parallel':
      // Task auto-spawned in parallel — remove extra pending bubble
      const pendingBubble = document.querySelector('.msg.assistant.pending');
      if (pendingBubble) pendingBubble.remove();
      addActivity('tool', `Running in parallel: "${data.text}"`);
      break;
    case 'activity':
      addActivity(data.kind, data.text, data.data, data.latency_ms);
      if (data.kind === 'thinking') {
        const p = document.querySelector('.msg.assistant.pending .msg-body');
        if (p) { p.textContent = data.text.substring(0, 80) + '...'; }
      }
      break;
    case 'response_text':
      if (data.subagent_result) playChime();
      addMessage('assistant', data.text);
      setStatus(isListening ? 'Mic open — speak to activate' : 'Connected', 'active');
      break;
    case 'tts_audio':
      queueTTS(data.audio_b64, data.sample_rate);
      break;
    case 'queue_status':
      updateQueueBadge(data.pending);
      break;
    case 'profile_switched':
      addActivity('tool', 'Switched to profile: ' + data.name);
      break;
    case 'status':
      // Deepgram reconnection status messages
      addActivity('tool', data.message);
      setStatus(data.message, 'processing');
      break;
    case 'config':
      // Server config — app name, etc.
      if (data.app_name) appName = data.app_name;
      break;
    case 'error':
      console.error('Server error:', data.message);
      addActivity('tool', 'Error: ' + data.message);
      break;
  }
}

function queueTTS(b64, sampleRate) {
  ttsQueue.push({ b64, sampleRate });
  if (!isPlayingTTS) playNextTTS();
}

function playNextTTS() {
  if (ttsQueue.length === 0) {
    isPlayingTTS = false;
    onAllTTSDone();
    return;
  }
  isPlayingTTS = true;
  const { b64, sampleRate } = ttsQueue.shift();
  const rate = sampleRate || 24000;
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const int16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;
  const ctx = getTTSContext(rate);
  const buffer = ctx.createBuffer(1, float32.length, rate);
  buffer.getChannelData(0).set(float32);
  currentTTSSource = ctx.createBufferSource();
  currentTTSSource.buffer = buffer;
  currentTTSSource.connect(ctx.destination);
  currentTTSSource.start();
  currentTTSSource.onended = () => {
    currentTTSSource = null;
    playNextTTS();
  };
}

function sendText() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  if (!ws || ws.readyState !== WebSocket.OPEN) connectWS();
  addMessage('user', text);
  ws.send(JSON.stringify({ action: 'text', text }));
  setStatus('Thinking...', 'processing');
}

function drawVisualizer() {
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  function draw() {
    animFrame = requestAnimationFrame(draw);
    if (!analyser) return;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    ctx.fillStyle = '#12121f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const bw = canvas.width / data.length;
    for (let i = 0; i < data.length; i++) {
      const h = (data[i] / 255) * canvas.height;
      const alpha = silenceFrames === 0 ? 0.8 : 0.2;
      ctx.fillStyle = `hsla(${(i / data.length) * 120 + 180}, 80%, 60%, ${alpha})`;
      ctx.fillRect(i * bw, canvas.height - h, bw - 1, h);
    }
  }
  draw();
}

// ── Profile switcher ──
async function loadProfiles() {
  try {
    const resp = await fetch('/api/profiles');
    const data = await resp.json();
    const sel = document.getElementById('profileSelect');
    sel.innerHTML = '';
    for (const [name, info] of Object.entries(data.profiles || {})) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = `${name} (${info.model})`;
      sel.appendChild(opt);
    }
    // Default selection from config
    if (sel.querySelector('option[value="default"]')) sel.value = 'default';
  } catch(e) {
    console.error('Failed to load profiles:', e);
  }
}

function switchProfile(name) {
  if (!name || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ action: 'profile', name }));
}

// ── Subagent completion chime (#6) ──
function playChime() {
  try {
    const ctx = new AudioContext({ sampleRate: 24000 });
    const duration = 0.3;
    const samples = Math.floor(ctx.sampleRate * duration);
    const buffer = ctx.createBuffer(1, samples, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    // Generate a pleasant two-tone chime (C5 + E5)
    for (let i = 0; i < samples; i++) {
      const t = i / ctx.sampleRate;
      const envelope = Math.exp(-t * 8); // Fast decay
      data[i] = envelope * 0.3 * (
        Math.sin(2 * Math.PI * 523.25 * t) +  // C5
        0.6 * Math.sin(2 * Math.PI * 659.25 * t)  // E5
      );
    }
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);
    source.start();
    source.onended = () => ctx.close();
  } catch(e) { console.debug('Chime failed:', e); }
}

// ── Sleep / Idle mode ──
function toggleSleep() {
  if (isSleeping) {
    isSleeping = false;
    updateSleepButton();
    setStatus('Connected', 'active');
  } else {
    goToSleep();
  }
}

function goToSleep() {
  isSleeping = true;
  if (isListening) stopListening();
  stopAllTTS();
  stopKeepAlive();
  updateSleepButton();
  setStatus('Sleeping (tap to wake)', '');
}

function updateSleepButton() {
  const btn = document.getElementById('btnSleep');
  if (isSleeping) {
    btn.textContent = 'Wake Up';
    btn.className = 'btn-sleep sleeping';
  } else {
    btn.textContent = 'Sleep';
    btn.className = 'btn-sleep';
  }
}

// ── Auto-wake / auto-sleep: activate/deactivate Deepgram on demand ──
function activateDeepgram() {
  if (isDeepgramActive) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  isDeepgramActive = true;
  speechFrames = 0;
  ws.send(JSON.stringify({ action: 'start' }));
  setStatus('Hearing you...', 'listening');
}

function deactivateDeepgram() {
  if (!isDeepgramActive) return;
  isDeepgramActive = false;
  speechFrames = 0;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'stop' }));
  }
  if (isListening) {
    setStatus('Mic open — speak to activate', 'active');
  }
}

// After TTS finishes: disconnect Deepgram, go back to VAD-only idle
function onAllTTSDone() {
  try {
    if (isSleeping) return;
    if (isListening && isDeepgramActive) {
      deactivateDeepgram();
    }
  } catch(e) { console.debug('onAllTTSDone error:', e); }
}

// ── Opus codec detection (#9) ──
function detectOpusSupport() {
  try {
    useOpus = typeof MediaRecorder !== 'undefined' &&
              MediaRecorder.isTypeSupported('audio/webm;codecs=opus');
    if (useOpus) addActivity('tool', 'Opus codec available — lower bandwidth');
  } catch(e) { useOpus = false; }
}

// ── Push-to-talk (spacebar) ──
document.addEventListener('keydown', (e) => {
  if (e.code !== 'Space' || e.repeat) return;
  // Don't capture if typing in text input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  e.preventDefault();
  if (!pttActive) {
    pttActive = true;
    if (!isListening) startListening();
    else if (!isDeepgramActive) activateDeepgram();
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code !== 'Space') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  e.preventDefault();
  if (pttActive) {
    pttActive = false;
    // Immediately submit whatever is buffered — skip utterance_end wait
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ action: 'submit_now' }));
    }
  }
});

connectWS();
loadProfiles();
detectOpusSupport();

// ── iOS keep-alive: silent audio loop prevents Safari from suspending JS ──
function startKeepAlive() {
  // iOS requires user gesture to create AudioContext — only call from tap handlers
  if (keepAliveCtx) return;
  try {
    keepAliveCtx = new AudioContext({ sampleRate: 8000 });
    if (keepAliveCtx.state === 'suspended') {
      keepAliveCtx.resume().catch(() => {});
    }
    const buf = keepAliveCtx.createBuffer(1, 8000, 8000);
    keepAliveSource = keepAliveCtx.createBufferSource();
    keepAliveSource.buffer = buf;
    keepAliveSource.loop = true;
    const gain = keepAliveCtx.createGain();
    gain.gain.value = 0.001;
    keepAliveSource.connect(gain);
    gain.connect(keepAliveCtx.destination);
    keepAliveSource.start();
    console.debug('Keep-alive audio started');
  } catch(e) { console.debug('Keep-alive failed (needs user gesture):', e); }
}

function stopKeepAlive() {
  if (keepAliveSource) { try { keepAliveSource.stop(); } catch(e) {} keepAliveSource = null; }
  if (keepAliveCtx) { try { keepAliveCtx.close(); } catch(e) {} keepAliveCtx = null; }
}

// Also use Page Visibility API to resume audio context if iOS paused it
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (keepAliveCtx && keepAliveCtx.state === 'suspended') {
      keepAliveCtx.resume();
    }
    if (audioContext && audioContext.state === 'suspended') {
      audioContext.resume();
    }
    // Reconnect WS if it dropped while backgrounded
    if (!ws || ws.readyState > 1) {
      connectWS();
    }
  }
});

// ── PWA Service Worker registration ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(
    (reg) => console.debug('SW registered:', reg.scope),
    (err) => console.debug('SW registration failed:', err)
  );
}
</script>
